    const HASH_KEY = "rdash-auth";
    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }
    const CORRECT = "33a82eaa94390a19d88e1e2f9663b96bd4bd4cf8a6274627171aaf33acb7adac"; // Claude123!
    async function checkPw() {
      const val = document.getElementById("pw-input").value;
      const hash = await sha256(val);
      if (hash === CORRECT) {
        sessionStorage.setItem(HASH_KEY, "1");
        unlock();
      } else {
        document.getElementById("pw-error").style.display = "block";
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-input").focus();
      }
    }
    function unlock() {
      document.getElementById("gate").style.display = "none";
      document.getElementById("root").style.display = "block";
    }
    // Stay unlocked within the same browser session
    if (sessionStorage.getItem(HASH_KEY) === "1") unlock();
  </script>

      return await res.json();

    async function pushToCloud(url, overrides) {
      // Use no-cors so browser doesn't block the cross-origin redirect Apps Script uses.

      await fetch(url, {

        mode: "no-cors",
        body: JSON.stringify({ overrides }),
        headers: { "Content-Type": "text/plain" },
      });

    function formatDate(val) {
      if (!val) return null;
      const [y, m, d] = val.split("-");
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `${months[parseInt(m,10)-1]} ${parseInt(d,10)}, ${y}`;

    function isOverdue(dueDate) {
      if (!dueDate) return false;
      return new Date(dueDate) < new Date(new Date().toDateString());

    const STORAGE_KEY = "research-dashboard-v1";

    const initialIds = new Set(initialTasks.map(t => t.id));

    function normalizeCategories(task) {
      // Backward compat: old data used category (string), new uses categories (array)
      if (!task.categories) {
        task.categories = task.category ? [task.category] : [];
        delete task.category;
      }
      return task;
    }

    function loadSavedData() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        const overrides = saved.overrides || {};
        const customTasks = (saved.customTasks || []).map(normalizeCategories);
        const base = initialTasks
          .filter(task => !overrides[task.id]?.deleted)
          .map(task => normalizeCategories({ ...task, ...(overrides[task.id] || {}) }));
        return [...base, ...customTasks];
      } catch { return initialTasks; }
    }

    function saveOverrides(items) {
      const customTasks = items.filter(i => !initialIds.has(i.id));
      const overrides = {};
      items.filter(i => initialIds.has(i.id)).forEach(item => {
        const base = initialTasks.find(t => t.id === item.id);
        if (!base) return;
        const diff = {};
        if (item.status   !== base.status)   diff.status   = item.status;
        if (item.priority !== base.priority) diff.priority = item.priority;
        if (item.dueDate  !== base.dueDate)  diff.dueDate  = item.dueDate;
        if (item.text     !== base.text)     diff.text     = item.text;
        const baseCats = base.categories || [];
        const itemCats = item.categories || [];
        if (JSON.stringify([...itemCats].sort()) !== JSON.stringify([...baseCats].sort())) diff.categories = itemCats;
        if (Object.keys(diff).length) overrides[item.id] = diff;
      });
      initialTasks.forEach(task => {
        if (!items.find(i => i.id === task.id)) {
          overrides[task.id] = { deleted: true };
        }
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ overrides, customTasks }));
    }

    function Dashboard() {

      // Sync state

      const [syncStatus, setSyncStatus]   = useState("idle"); // idle | syncing | synced | error

      const [syncUrlInput, setSyncUrlInput] = useState(() => getSyncUrl());
      const debouncedPush = useRef(null);

      // On mount: pull latest from cloud if URL is set
      useEffect(() => {
        if (!syncUrl) return;
        setSyncStatus("syncing");
        fetchFromCloud(syncUrl)
          .then(data => {
            if (data && (data.overrides || data.customTasks)) {
              const overrides = data.overrides || {};
              const cloudCustomTasks = data.customTasks || [];
              const merged = [
                ...initialTasks
                  .filter(task => !overrides[task.id]?.deleted)
                  .map(task => ({ ...task, ...(overrides[task.id] || {}) })),
                ...cloudCustomTasks,
              ];
              setItems(merged);
              saveOverrides(merged);
              if (data.customCategories?.length) {
                setCustomCategories(data.customCategories);
                localStorage.setItem("research-dashboard-categories", JSON.stringify(data.customCategories));
              }
            }
            setSyncStatus("synced");
          })
          .catch(() => setSyncStatus("error"));
      }, [syncUrl]);

      // Set up debounced push whenever syncUrl changes
      useEffect(() => {
        debouncedPush.current = debounce((data, url) => {
          if (!url) return;
          setSyncStatus("syncing");
          pushToCloud(url, data)
            .then(() => setSyncStatus("synced"))
            .catch(() => setSyncStatus("synced"));
        }, 1500);
      }, [syncUrl]);

      // Reminder timer — fires every reminderFreq minutes
      useEffect(() => {
        if (!reminderFreq) return;
        const id = setInterval(() => setShowReminderPopup(true), reminderFreq * 60 * 1000);
        return () => clearInterval(id);
      }, [reminderFreq]);

      const updateItems = (updater) => {
        setItems(prev => {
          const next = typeof updater === "function" ? updater(prev) : updater;
          const overrides = {};
          next.forEach(item => {
            const base = initialTasks.find(t => t.id === item.id);
            if (!base) return;
            const diff = {};
            if (item.status   !== base.status)   diff.status   = item.status;
            if (item.priority !== base.priority) diff.priority = item.priority;
            if (item.dueDate  !== base.dueDate)  diff.dueDate  = item.dueDate;
            if (item.text     !== base.text)     diff.text     = item.text;
            if (Object.keys(diff).length) overrides[item.id] = diff;
          });
          // Mark deleted items so the cloud also knows to exclude them
          initialTasks.forEach(task => {
            if (!next.find(i => i.id === task.id)) {
              overrides[task.id] = { deleted: true };
            }
          });
          saveOverrides(next); // always save locally
          if (syncUrl && debouncedPush.current) {
            const customCats = JSON.parse(localStorage.getItem("research-dashboard-categories") || "[]");
            debouncedPush.current({ overrides, customTasks: next.filter(i => !initialIds.has(i.id)), customCategories: customCats }, syncUrl);
          }
          return next;
        });
      };

        const url = syncUrlInput.trim();
        localStorage.setItem(SYNC_URL_KEY, url);
        setSyncUrl(url);
        setShowSettings(false);
      };

      const [activeStatus, setActiveStatus]     = useState("All");
      const [activePriority, setActivePriority] = useState("All");
      const [search, setSearch]                 = useState("");
      const [sortBy, setSortBy]                 = useState(() => localStorage.getItem("research-dashboard-sort") || "default");
      const [reminderFreq, setReminderFreq]     = useState(() => parseInt(localStorage.getItem("research-dashboard-reminder-freq") || "0"));

      const [customCategories, setCustomCategories] = useState(() => {
        try { return JSON.parse(localStorage.getItem("research-dashboard-categories") || "[]"); }
        catch { return []; }

      const [showAddTask, setShowAddTask]       = useState(false);
      const [newTaskText, setNewTaskText]       = useState("");
      const [newTaskCategories, setNewTaskCategories] = useState([]);
      const [newTaskPriority, setNewTaskPriority] = useState("");
      const [newTaskDueDate, setNewTaskDueDate] = useState("");
      const [showAddLabel, setShowAddLabel]     = useState(false);
      const [newLabelName, setNewLabelName]     = useState("");
      const [newLabelColor, setNewLabelColor]   = useState(COLOR_PRESETS.Pastel[11]); // Blue
      const [editingDate, setEditingDate]       = useState(null);
      const [editingText, setEditingText]       = useState(null);
      const [editingCategory, setEditingCategory] = useState(null); // taskId with open add-label dropdown
      const [hoveredId, setHoveredId]           = useState(null);
      const [hoveredLabel, setHoveredLabel]     = useState(null);
      const [hoveredChip, setHoveredChip]       = useState(null); // "taskId:catName"
      const [deletedDefaults, setDeletedDefaults] = useState(() => {
        try { return JSON.parse(localStorage.getItem("research-dashboard-deleted-defaults") || "[]"); }
        catch { return []; }
      });

      const activeDefaultColors = Object.fromEntries(
        Object.entries(categoryColors).filter(([name]) => !deletedDefaults.includes(name))
      );
      const allCategoryColors = {
        ...activeDefaultColors,
        ...Object.fromEntries(customCategories.map(c => [c.name, { ...c, isCustom: true }])),
      };

      const deleteItem = (id) => {
        updateItems(prev => prev.filter(item => item.id !== id));
      };
      const [editingTextVal, setEditingTextVal] = useState("");

      const categories = ["All", ...Object.keys(allCategoryColors)];

      const nextCustomId = () => {
        const ids = items.filter(i => !initialIds.has(i.id)).map(i => i.id);
        return ids.length > 0 ? Math.max(...ids) + 1 : 10000;
      };

      const addTask = () => {
        if (!newTaskText.trim()) return;
        updateItems(prev => [...prev, {
          id: nextCustomId(),
          categories: newTaskCategories,
          text: newTaskText.trim(),
          status: "todo",
          link: null,
          priority: newTaskPriority || null,
          dueDate: newTaskDueDate || "",
        }]);
        setNewTaskText(""); setNewTaskCategories([]); setNewTaskPriority(""); setNewTaskDueDate("");
        setShowAddTask(false);
      };

      const addCustomCategory = () => {
        const name = newLabelName.trim();
        if (!name || allCategoryColors[name]) return;
        const updated = [...customCategories, { name, ...newLabelColor, isCustom: true }];
        setCustomCategories(updated);
        localStorage.setItem("research-dashboard-categories", JSON.stringify(updated));
        setNewLabelName(""); setShowAddLabel(false);
      };

      const deleteCustomCategory = (name) => {
        const updated = customCategories.filter(c => c.name !== name);
        setCustomCategories(updated);
        localStorage.setItem("research-dashboard-categories", JSON.stringify(updated));
      };

      const deleteDefaultCategory = (name) => {
        const updated = [...deletedDefaults, name];
        setDeletedDefaults(updated);
        localStorage.setItem("research-dashboard-deleted-defaults", JSON.stringify(updated));
      };

      const restoreDefaultCategory = (name) => {
        const updated = deletedDefaults.filter(n => n !== name);
        setDeletedDefaults(updated);
        localStorage.setItem("research-dashboard-deleted-defaults", JSON.stringify(updated));
      };

      const cycleStatus = (id) => {
        const order = ["todo", "inprogress", "done"];
        updateItems(prev => prev.map(item => {
          if (item.id !== id) return item;
          return { ...item, status: order[(order.indexOf(item.status) + 1) % order.length] };
        }));
      };

      const cyclePriority = (id) => {
        const order = [null, "high", "medium", "low"];
        updateItems(prev => prev.map(item => {
          if (item.id !== id) return item;
          return { ...item, priority: order[(order.indexOf(item.priority) + 1) % order.length] };
        }));
      };

      const setDueDate = (id, val) => {
        updateItems(prev => prev.map(item => item.id === id ? { ...item, dueDate: val } : item));
      };

      const priorityRank = { high: 0, medium: 1, low: 2 };

      const filtered = items
        .filter(item => {
          const matchCat  = activeCategory === "All" || (item.categories || []).includes(activeCategory);
          const matchStat = activeStatus   === "All" || item.status   === activeStatus;
          const matchPri  = activePriority === "All" || item.priority === activePriority;
          const matchSrch = item.text.toLowerCase().includes(search.toLowerCase());
          return matchCat && matchStat && matchPri && matchSrch;
        })
        .sort((a, b) => {
          if (sortBy === "priority") return (priorityRank[a.priority] ?? 3) - (priorityRank[b.priority] ?? 3);
          if (sortBy === "dueDate") {
            if (!a.dueDate && !b.dueDate) return 0;
            if (!a.dueDate) return 1;
            if (!b.dueDate) return -1;
            return a.dueDate.localeCompare(b.dueDate);
          }
          return 0;
        });

      const total  = items.length;
      const done   = items.filter(i => i.status === "done").length;
      const inprog = items.filter(i => i.status === "inprogress").length;
      const pct    = Math.round((done / total) * 100);

      const grouped = Object.keys(allCategoryColors).reduce((acc, cat) => {
        acc[cat] = items.filter(i => (i.categories || []).includes(cat));
        return acc;
      }, {});

      const highCount    = items.filter(i => i.priority === "high" && i.status !== "done").length;
      const overdueCount = items.filter(i => isOverdue(i.dueDate) && i.status !== "done").length;

      // Tasks shown in reminder: high priority (not done) + overdue (not done) + in-progress
      const reminderTasks = items.filter(i =>
        i.status !== "done" && (
          i.priority === "high" ||
          isOverdue(i.dueDate) ||
          i.status === "inprogress"
        )
      );

      return (
        <div className="min-h-screen bg-gray-50">

          {/* Reminder popup */}
          {showReminderPopup && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
              <div style={{background:"white",borderRadius:"16px",padding:"28px",maxWidth:"480px",width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>
                  <h2 style={{fontWeight:"700",fontSize:"17px",color:"#111827",margin:0}}>⏰ Task Reminder</h2>
                  <button onClick={() => setShowReminderPopup(false)}
                    style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#6b7280",lineHeight:1,padding:"2px 6px"}}>✕</button>
                </div>
                {reminderTasks.length === 0 ? (
                  <p style={{color:"#6b7280",fontSize:"14px",margin:0}}>No urgent tasks right now — you're all caught up! 🎉</p>
                ) : (
                  <>
                    <p style={{color:"#6b7280",fontSize:"13px",marginBottom:"14px"}}>
                      You have <strong>{reminderTasks.length}</strong> task{reminderTasks.length !== 1 ? "s" : ""} needing attention:
                    </p>
                    <div style={{display:"flex",flexDirection:"column",gap:"8px",maxHeight:"300px",overflowY:"auto"}}>
                      {reminderTasks.map(item => {
                        const overdue = isOverdue(item.dueDate);
                        return (
                          <div key={item.id} style={{display:"flex",alignItems:"flex-start",gap:"10px",padding:"10px 12px",borderRadius:"10px",border:"1px solid #e5e7eb",background:"#fafafa"}}>
                            <div style={{flexShrink:0,marginTop:"2px"}}>
                              {item.priority === "high" ? "🔴" : overdue ? "⚠️" : "🔵"}
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                              <p style={{margin:0,fontSize:"13px",fontWeight:"500",color:"#111827",lineHeight:"1.4"}}>{item.text}</p>
                              <div style={{display:"flex",gap:"6px",marginTop:"5px",flexWrap:"wrap"}}>
                                {(item.categories||[]).map(cat => (
                                  <span key={cat} style={{fontSize:"11px",padding:"1px 7px",borderRadius:"99px",background:"#f3f4f6",color:"#6b7280"}}>{cat}</span>
                                ))}
                                {item.priority === "high" && <span style={{fontSize:"11px",padding:"1px 7px",borderRadius:"99px",background:"#fee2e2",color:"#dc2626"}}>High priority</span>}
                                {overdue && <span style={{fontSize:"11px",padding:"1px 7px",borderRadius:"99px",background:"#fff7ed",color:"#ea580c"}}>Overdue</span>}
                                {item.status === "inprogress" && <span style={{fontSize:"11px",padding:"1px 7px",borderRadius:"99px",background:"#eff6ff",color:"#2563eb"}}>In progress</span>}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}
                <button onClick={() => setShowReminderPopup(false)}
                  style={{marginTop:"18px",width:"100%",background:"#7c3aed",color:"white",border:"none",borderRadius:"8px",padding:"9px",fontSize:"14px",fontWeight:"600",cursor:"pointer"}}>
                  Got it
                </button>
              </div>
            </div>
          )}

          {/* Add Task modal */}
          {showAddTask && (
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
              <div style={{background:"white",borderRadius:"16px",padding:"28px",maxWidth:"440px",width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
                  <h2 style={{fontWeight:"700",fontSize:"17px",color:"#111827",margin:0}}>Add Task</h2>
                  <button onClick={() => setShowAddTask(false)} style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#6b7280",lineHeight:1,padding:"2px 6px"}}>✕</button>
                </div>

                {/* Task text */}
                <div style={{marginBottom:"14px"}}>
                  <label style={{fontSize:"13px",fontWeight:"500",color:"#374151",display:"block",marginBottom:"5px"}}>Task description *</label>
                  <input
                    autoFocus
                    type="text"
                    value={newTaskText}
                    onChange={e => setNewTaskText(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addTask()}
                    placeholder="What needs to be done?"
                    style={{width:"100%",fontSize:"14px",border:"1px solid #d1d5db",borderRadius:"8px",padding:"8px 12px",outline:"none",boxSizing:"border-box"}}
                  />
                </div>

                {/* Labels — toggle pills */}
                <div style={{marginBottom:"14px"}}>
                  <label style={{fontSize:"13px",fontWeight:"500",color:"#374151",display:"block",marginBottom:"7px"}}>
                    Labels <span style={{fontWeight:"400",color:"#9ca3af"}}>(optional, pick any)</span>
                  </label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>
                    {Object.entries(allCategoryColors).map(([cat, cc]) => {
                      const selected = newTaskCategories.includes(cat);
                      const toggle = () => setNewTaskCategories(prev =>
                        prev.includes(cat) ? prev.filter(x => x !== cat) : [...prev, cat]
                      );
                      return cc.isCustom ? (
                        <button key={cat} onClick={toggle} style={{
                          fontSize:"12px",padding:"3px 10px",borderRadius:"9999px",fontWeight:"500",cursor:"pointer",
                          background: selected ? cc.text : cc.bg,
                          color: selected ? "#fff" : cc.text,
                          border: `1.5px solid ${selected ? cc.text : cc.border}`,
                          outline: selected ? `2px solid ${cc.text}` : "none", outlineOffset:"1px",
                        }}>{cat}</button>
                      ) : (
                        <button key={cat} onClick={toggle}
                          className={selected ? "" : `${cc.bg} ${cc.text}`}
                          style={{
                            fontSize:"12px",padding:"3px 10px",borderRadius:"9999px",fontWeight:"500",cursor:"pointer",
                            ...(selected ? {background:"#7c3aed",color:"white",border:"1.5px solid #7c3aed"} : {border:"1.5px solid transparent"}),
                          }}>{cat}</button>
                      );
                    })}
                  </div>
                  {newTaskCategories.length > 0 && (
                    <button onClick={() => setNewTaskCategories([])} style={{marginTop:"6px",fontSize:"11px",color:"#9ca3af",background:"none",border:"none",cursor:"pointer",padding:0}}>
                      Clear all
                    </button>
                  )}
                </div>

                <div style={{display:"flex",gap:"12px",marginBottom:"20px"}}>
                  {/* Priority */}
                  <div style={{flex:1}}>
                    <label style={{fontSize:"13px",fontWeight:"500",color:"#374151",display:"block",marginBottom:"5px"}}>Priority</label>
                    <select
                      value={newTaskPriority}
                      onChange={e => setNewTaskPriority(e.target.value)}
                      style={{width:"100%",fontSize:"14px",border:"1px solid #d1d5db",borderRadius:"8px",padding:"8px 10px",outline:"none",background:"white"}}
                    >
                      <option value="">None</option>
                      <option value="high">🔴 High</option>
                      <option value="medium">🟡 Medium</option>
                      <option value="low">⚪ Low</option>
                    </select>
                  </div>
                  {/* Due date */}
                  <div style={{flex:1}}>
                    <label style={{fontSize:"13px",fontWeight:"500",color:"#374151",display:"block",marginBottom:"5px"}}>Due date</label>
                    <input
                      type="date"
                      value={newTaskDueDate}
                      onChange={e => setNewTaskDueDate(e.target.value)}
                      style={{width:"100%",fontSize:"14px",border:"1px solid #d1d5db",borderRadius:"8px",padding:"8px 10px",outline:"none",boxSizing:"border-box"}}
                    />
                  </div>
                </div>

                <div style={{display:"flex",gap:"8px"}}>
                  <button onClick={addTask}
                    style={{flex:1,background:"#7c3aed",color:"white",border:"none",borderRadius:"8px",padding:"9px",fontSize:"14px",fontWeight:"600",cursor:"pointer"}}>
                    Add Task
                  </button>
                  <button onClick={() => setShowAddTask(false)}
                    style={{flex:1,background:"#f3f4f6",color:"#374151",border:"none",borderRadius:"8px",padding:"9px",fontSize:"14px",cursor:"pointer"}}>
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Header */}
          <div className="bg-white border-b border-gray-200 px-6 py-5 sticky top-0 z-10 shadow-sm">
            <div style={{maxWidth:"1100px",margin:"0 auto"}} className="flex flex-col gap-3">
              <div className="flex items-center justify-between flex-wrap gap-3">
                <div>
                  <h1 className="text-2xl font-bold text-gray-900">Research Task Dashboard</h1>
                  <p className="text-sm text-gray-500 mt-1">Psychotherapy · AI · IRB · Resources</p>
                </div>
                <div className="flex items-center gap-2 flex-wrap">
                  {highCount > 0 && (
                    <span className="text-xs bg-red-50 text-red-600 border border-red-200 px-2 py-1 rounded-full font-medium">
                      🔴 {highCount} high priority
                    </span>
                  )}
                  {overdueCount > 0 && (
                    <span className="text-xs bg-orange-50 text-orange-600 border border-orange-200 px-2 py-1 rounded-full font-medium">
                      ⚠️ {overdueCount} overdue
                    </span>
                  )}
                  {/* Sync status */}
                  {syncUrl && (
                    <span style={{fontSize:"12px", padding:"3px 8px", borderRadius:"9999px", border:"1px solid",
                      background: syncStatus==="synced" ? "#f0fdf4" : syncStatus==="syncing" ? "#eff6ff" : syncStatus==="error" ? "#fef2f2" : "#f9fafb",
                      borderColor: syncStatus==="synced" ? "#86efac" : syncStatus==="syncing" ? "#93c5fd" : syncStatus==="error" ? "#fca5a5" : "#e5e7eb",
                      color: syncStatus==="synced" ? "#16a34a" : syncStatus==="syncing" ? "#2563eb" : syncStatus==="error" ? "#dc2626" : "#6b7280",
                    }}>
                      {syncStatus==="synced" ? "☁️ Synced" : syncStatus==="syncing" ? "⏳ Syncing…" : syncStatus==="error" ? "⚠️ Sync error" : "☁️ —"}
                    </span>
                  )}

                  <input
                    type="text"
                    placeholder="Search tasks..."
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                    className="border border-gray-200 rounded-lg px-3 py-2 text-sm w-48"
                    style={{outline:"none"}}
                  />

                  {/* Add Task button */}
                  <button onClick={() => setShowAddTask(true)}
                    style={{fontSize:"13px", fontWeight:"600", background:"#7c3aed", color:"white", border:"none", borderRadius:"8px", padding:"6px 14px", cursor:"pointer", display:"flex", alignItems:"center", gap:"4px"}}
                  >+ Task</button>

                  {/* Settings button */}
                  <button onClick={() => setShowSettings(s => !s)}
                    title="Settings"
                    style={{fontSize:"18px", background:"none", border:"none", cursor:"pointer", padding:"2px 4px", borderRadius:"6px", lineHeight:1}}
                  >⚙️</button>
                </div>
              </div>
              {/* Progress bar */}
              <div className="flex items-center gap-3">
                <div className="flex-1 bg-gray-100 rounded-full" style={{height:"8px"}}>
                  <div className="bg-green-500 rounded-full" style={{height:"8px", width:`${pct}%`, transition:"width 0.5s"}} />
                </div>
                <span className="text-sm text-gray-600 whitespace-nowrap">
                  {done}/{total} done · {inprog} in progress · {pct}%
                </span>
              </div>
            </div>
          </div>

          <div style={{maxWidth:"1100px",margin:"0 auto",padding:"24px"}}>

            {/* Settings panel */}
            {showSettings && (
              <div style={{background:"white", border:"1px solid #e5e7eb", borderRadius:"12px", padding:"20px", marginBottom:"20px", boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
                <h2 style={{fontWeight:"600", fontSize:"15px", marginBottom:"16px", color:"#111827"}}>⚙️ Settings</h2>

                {/* Sync URL */}
                <p style={{fontSize:"13px", fontWeight:"500", color:"#374151", marginBottom:"6px"}}>Cloud Sync URL</p>
                <p style={{fontSize:"13px", color:"#6b7280", marginBottom:"10px", lineHeight:"1.5"}}>
                  Paste your Google Apps Script web app URL to sync task state across devices.
                </p>
                <div style={{display:"flex", gap:"8px", alignItems:"center", marginBottom:"20px"}}>
                  <input
                    type="text"
                    value={syncUrlInput}
                    onChange={e => setSyncUrlInput(e.target.value)}
                    placeholder="https://script.google.com/macros/s/..."
                    style={{flex:1, fontSize:"13px", border:"1px solid #d1d5db", borderRadius:"8px", padding:"6px 10px", outline:"none", fontFamily:"monospace"}}
                  />
                  <button onClick={saveSyncUrl}
                    style={{background:"#7c3aed", color:"white", border:"none", borderRadius:"8px", padding:"6px 14px", fontSize:"13px", cursor:"pointer", fontWeight:"500"}}
                  >Save</button>
                  {syncUrl && (
                    <button onClick={() => { setSyncUrlInput(""); localStorage.removeItem(SYNC_URL_KEY); setSyncUrl(""); setShowSettings(false); }}
                      style={{background:"#fee2e2", color:"#dc2626", border:"none", borderRadius:"8px", padding:"6px 10px", fontSize:"13px", cursor:"pointer"}}
                    >Remove</button>
                  )}
                </div>

                {/* Reminder frequency */}
                <div style={{borderTop:"1px solid #f3f4f6", paddingTop:"16px"}}>
                  <p style={{fontSize:"13px", fontWeight:"500", color:"#374151", marginBottom:"6px"}}>⏰ Task Reminder</p>
                  <p style={{fontSize:"13px", color:"#6b7280", marginBottom:"10px"}}>
                    Show a popup summarising high-priority, overdue, and in-progress tasks at a set interval.
                  </p>
                  <div style={{display:"flex", alignItems:"center", gap:"10px"}}>
                    <select
                      value={reminderFreq}
                      onChange={e => {
                        const val = parseInt(e.target.value);
                        setReminderFreq(val);
                        localStorage.setItem("research-dashboard-reminder-freq", val);
                      }}
                      style={{fontSize:"13px", border:"1px solid #d1d5db", borderRadius:"8px", padding:"6px 10px", outline:"none", background:"white", cursor:"pointer"}}
                    >
                      <option value="0">Off</option>
                      <option value="15">Every 15 minutes</option>
                      <option value="30">Every 30 minutes</option>
                      <option value="60">Every hour</option>
                      <option value="120">Every 2 hours</option>
                      <option value="240">Every 4 hours</option>
                      <option value="480">Every 8 hours</option>
                    </select>
                    {reminderFreq > 0 && (
                      <button onClick={() => setShowReminderPopup(true)}
                        style={{fontSize:"13px", background:"#f3f4f6", border:"1px solid #e5e7eb", borderRadius:"8px", padding:"6px 12px", cursor:"pointer", color:"#374151"}}
                      >Preview reminder</button>
                    )}
                  </div>
                </div>

              {/* Label management */}
              <div style={{marginTop:"18px",paddingTop:"18px",borderTop:"1px solid #e5e7eb"}}>
                <div style={{fontWeight:"600",fontSize:"14px",color:"#374151",marginBottom:"10px"}}>Labels</div>

                {/* All labels — hover to reveal × */}
                <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"12px"}}>
                  {/* Default labels */}
                  {Object.entries(categoryColors).filter(([name]) => !deletedDefaults.includes(name)).map(([name, c]) => (
                    <span key={name}
                      onMouseEnter={() => setHoveredLabel(name)}
                      onMouseLeave={() => setHoveredLabel(null)}
                      className={`text-xs rounded-full font-medium ${c.bg} ${c.text}`}
                      style={{display:"inline-flex",alignItems:"center",gap:"3px",padding:"3px 8px",cursor:"default",position:"relative"}}
                    >
                      {name}
                      <button
                        onClick={() => deleteDefaultCategory(name)}
                        title="Remove label"
                        style={{
                          background:"none",border:"none",cursor:"pointer",padding:"0 0 0 1px",
                          fontSize:"13px",lineHeight:1,fontWeight:"bold",
                          opacity: hoveredLabel === name ? 0.7 : 0,
                          transition:"opacity 0.15s",
                        }}
                      >×</button>
                    </span>
                  ))}
                  {/* Custom labels */}
                  {customCategories.map(c => (
                    <span key={c.name}
                      onMouseEnter={() => setHoveredLabel(c.name)}
                      onMouseLeave={() => setHoveredLabel(null)}
                      style={{
                        display:"inline-flex",alignItems:"center",gap:"3px",
                        fontSize:"12px",padding:"3px 8px",borderRadius:"9999px",fontWeight:"500",
                        background:c.bg,color:c.text,border:`1px solid ${c.border}`,
                      }}
                    >
                      {c.name}
                      <button
                        onClick={() => deleteCustomCategory(c.name)}
                        title="Remove label"
                        style={{
                          background:"none",border:"none",cursor:"pointer",padding:"0 0 0 1px",
                          fontSize:"13px",lineHeight:1,fontWeight:"bold",color:c.text,
                          opacity: hoveredLabel === c.name ? 0.7 : 0,
                          transition:"opacity 0.15s",
                        }}
                      >×</button>
                    </span>
                  ))}
                  {/* Deleted defaults — restore option */}
                  {deletedDefaults.map(name => (
                    <span key={name}
                      title="Click to restore"
                      onClick={() => restoreDefaultCategory(name)}
                      style={{
                        display:"inline-flex",alignItems:"center",gap:"4px",
                        fontSize:"12px",padding:"3px 8px",borderRadius:"9999px",fontWeight:"500",
                        background:"#f3f4f6",color:"#9ca3af",border:"1px dashed #d1d5db",
                        cursor:"pointer",textDecoration:"line-through",
                      }}
                    >
                      {name}
                      <span style={{fontSize:"11px",textDecoration:"none"}}>↩</span>
                    </span>
                  ))}
                </div>

                {/* Add new label */}
                {showAddLabel ? (
                  <div style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:"10px",padding:"14px",display:"flex",flexDirection:"column",gap:"12px"}}>
                    <input
                      type="text"
                      placeholder="Label name…"
                      value={newLabelName}
                      onChange={e => setNewLabelName(e.target.value)}
                      onKeyDown={e => { if (e.key === "Enter") addCustomCategory(); if (e.key === "Escape") setShowAddLabel(false); }}
                      autoFocus
                      style={{fontSize:"13px",border:"1px solid #d1d5db",borderRadius:"7px",padding:"6px 10px",outline:"none"}}
                    />
                    <div>
                      <div style={{fontSize:"12px",color:"#6b7280",marginBottom:"8px"}}>Color</div>
                      {Object.entries(COLOR_PRESETS).map(([paletteName, palette]) => (
                        <div key={paletteName} style={{marginBottom:"8px"}}>
                          <div style={{fontSize:"11px",color:"#9ca3af",marginBottom:"4px",fontWeight:"500",letterSpacing:"0.05em",textTransform:"uppercase"}}>{paletteName}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
                            {palette.map(preset => (
                              <button
                                key={preset.label}
                                title={preset.label}
                                onClick={() => setNewLabelColor(preset)}
                                style={{
                                  width:"20px",height:"20px",borderRadius:"50%",cursor:"pointer",flexShrink:0,
                                  background:preset.bg,
                                  border: newLabelColor.label === preset.label ? `3px solid ${preset.text}` : `2px solid ${preset.border}`,
                                  outline: newLabelColor.label === preset.label ? `2px solid ${preset.text}` : "none",
                                  outlineOffset:"2px",
                                  transition:"transform 0.1s",
                                  transform: newLabelColor.label === preset.label ? "scale(1.25)" : "scale(1)",
                                }}
                              />
                            ))}
                          </div>
                        </div>
                      ))}
                      {newLabelName.trim() && (
                        <div style={{marginTop:"8px",display:"flex",alignItems:"center",gap:"8px"}}>
                          <span style={{fontSize:"12px",color:"#6b7280"}}>Preview:</span>
                          <span style={{
                            fontSize:"12px",padding:"2px 10px",borderRadius:"9999px",fontWeight:"500",
                            background:newLabelColor.bg,color:newLabelColor.text,border:`1px solid ${newLabelColor.border}`,
                          }}>{newLabelName.trim()}</span>
                        </div>
                      )}
                    </div>
                    <div style={{display:"flex",gap:"6px"}}>
                      <button
                        onClick={addCustomCategory}
                        disabled={!newLabelName.trim()}
                        style={{
                          fontSize:"13px",padding:"5px 14px",borderRadius:"7px",cursor:"pointer",fontWeight:"500",
                          background: newLabelName.trim() ? "#a855f7" : "#e5e7eb",
                          color: newLabelName.trim() ? "white" : "#9ca3af",
                          border:"none",
                        }}
                      >Add label</button>
                      <button
                        onClick={() => { setShowAddLabel(false); setNewLabelName(""); }}
                        style={{fontSize:"13px",padding:"5px 10px",borderRadius:"7px",cursor:"pointer",background:"#f3f4f6",border:"1px solid #e5e7eb",color:"#6b7280"}}
                      >Cancel</button>
                    </div>
                  </div>
                ) : (
                  <button
                    onClick={() => setShowAddLabel(true)}
                    style={{fontSize:"13px",padding:"5px 12px",borderRadius:"7px",cursor:"pointer",background:"#f3f4f6",border:"1px dashed #d1d5db",color:"#6b7280",display:"flex",alignItems:"center",gap:"4px"}}
                  >+ New label</button>
                )}
              </div>

              </div>
            )}

            {/* Category cards */}
            <div className="grid gap-3 mb-6" style={{gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))"}}>
              {Object.keys(allCategoryColors).map(cat => {
                const c = allCategoryColors[cat];
                const count = (grouped[cat] || []).length;
                const doneCount = (grouped[cat] || []).filter(i => i.status === "done").length;
                return c.isCustom ? (
                  <button
                    key={cat}
                    onClick={() => setActiveCategory(activeCategory === cat ? "All" : cat)}
                    style={{
                      borderRadius:"12px", padding:"12px", textAlign:"left", border:`1px solid ${c.border}`,
                      background: c.bg, transition:"all 0.15s", cursor:"pointer",
                      outline: activeCategory === cat ? "2px solid #a855f7" : "none", outlineOffset:"2px",
                    }}
                  >
                    <div style={{fontSize:"12px",fontWeight:"600",color:c.text,marginBottom:"4px"}}>{cat}</div>
                    <div style={{fontSize:"24px",fontWeight:"700",color:c.text}}>{count}</div>
                    <div className="text-xs text-gray-500 mt-1">{doneCount} done</div>
                  </button>
                ) : (
                  <button
                    key={cat}
                    onClick={() => setActiveCategory(activeCategory === cat ? "All" : cat)}
                    className={`rounded-xl p-3 text-left border transition-all ${c.bg} ${c.border}`}
                    style={activeCategory === cat ? {outline:"2px solid #a855f7", outlineOffset:"2px"} : {}}
                  >
                    <div className={`text-xs font-semibold ${c.text} mb-1`}>{cat}</div>
                    <div className={`text-2xl font-bold ${c.text}`}>{count}</div>
                    <div className="text-xs text-gray-500 mt-1">{doneCount} done</div>
                  </button>
                );
              })}
            </div>

            {/* Filters */}
            <div className="flex flex-wrap gap-2 mb-5 items-center">
              <div className="flex gap-1 flex-wrap">
                {categories.map(cat => (
                  <button
                    key={cat}
                    onClick={() => setActiveCategory(cat)}
                    className={`px-3 py-1 rounded-full text-sm font-medium border transition-all ${
                      activeCategory === cat ? "bg-purple-600 text-white border-purple-600" : "bg-white text-gray-600 border-gray-200"
                    }`}
                  >{cat}</button>
                ))}
              </div>
              <div style={{width:"1px",height:"20px",background:"#e5e7eb"}} />
              <div className="flex gap-1 flex-wrap">
                {["All","high","medium","low"].map(p => (
                  <button
                    key={p}
                    onClick={() => setActivePriority(p)}
                    className={`px-3 py-1 rounded-full text-sm font-medium border transition-all ${
                      activePriority === p ? "bg-gray-800 text-white border-gray-800" : "bg-white text-gray-600 border-gray-200"
                    }`}
                  >{p === "All" ? "All Priorities" : `${priorityConfig[p].dot} ${priorityConfig[p].label}`}</button>
                ))}
              </div>
              <div style={{width:"1px",height:"20px",background:"#e5e7eb"}} />
              <div className="flex gap-1 flex-wrap">
                {["All","todo","inprogress","done"].map(s => (
                  <button
                    key={s}
                    onClick={() => setActiveStatus(s)}
                    className={`px-3 py-1 rounded-full text-sm font-medium border transition-all ${
                      activeStatus === s ? "bg-gray-600 text-white border-gray-600" : "bg-white text-gray-600 border-gray-200"
                    }`}
                  >{s === "All" ? "All Statuses" : statusStyles[s].label}</button>
                ))}
              </div>
              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:"8px"}}>
                <span className="text-xs text-gray-500">Sort:</span>
                <select
                  value={sortBy}
                  onChange={e => { setSortBy(e.target.value); localStorage.setItem("research-dashboard-sort", e.target.value); }}
                  className="text-sm border border-gray-200 rounded-lg px-2 py-1 bg-white"
                >
                  <option value="default">Default</option>
                  <option value="priority">Priority</option>
                  <option value="dueDate">Due Date</option>
                </select>
              </div>
            </div>

            <p className="text-sm text-gray-500 mb-4">
              Showing {filtered.length} item{filtered.length !== 1 ? "s" : ""}
              {search && ` matching "${search}"`}
            </p>

            {/* Task list */}
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {filtered.length === 0 && (
                <div className="text-center py-16 text-gray-400 bg-white rounded-xl border border-gray-100">
                  No tasks match your filters.
                </div>
              )}
              {filtered.map(item => {
                const s = statusStyles[item.status];
                const p = item.priority ? priorityConfig[item.priority] : null;
                const overdue = isOverdue(item.dueDate) && item.status !== "done";

                return (
                  <div
                    key={item.id}
                    className={`flex items-center gap-3 bg-white border rounded-xl px-4 py-3 ${item.status === "done" ? "opacity-50" : ""}`}
                    onMouseEnter={() => setHoveredId(item.id)}
                    onMouseLeave={() => setHoveredId(null)}
                    style={{
                      borderColor: overdue ? "#fdba74" : "#f3f4f6",
                      background: overdue ? "#fff7ed" : "white",
                      transition: "box-shadow 0.15s",
                    }}
                  >
                    {/* Status circle */}
                    <button
                      onClick={() => cycleStatus(item.id)}
                      title="Click to advance status"
                      style={{
                        width:"20px", height:"20px", borderRadius:"50%", border:"2px solid",
                        flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center",
                        cursor:"pointer", transition:"all 0.15s",
                        borderColor: item.status === "done" ? "#22c55e" : item.status === "inprogress" ? "#60a5fa" : "#d1d5db",
                        background: item.status === "done" ? "#22c55e" : item.status === "inprogress" ? "#60a5fa" : "white",
                      }}
                    >
                      {item.status === "done" && (
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3">
                          <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                      )}
                      {item.status === "inprogress" && <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"white"}} />}
                    </button>

                    {/* Task text */}
                    <div style={{flex:1, minWidth:0}}>
                      {editingText === item.id ? (
                        <input
                          autoFocus
                          type="text"
                          value={editingTextVal}
                          onChange={e => setEditingTextVal(e.target.value)}
                          onBlur={() => {
                            const trimmed = editingTextVal.trim();
                            if (trimmed) updateItems(prev => prev.map(t => t.id === item.id ? { ...t, text: trimmed } : t));
                            setEditingText(null);
                          }}
                          onKeyDown={e => {
                            if (e.key === "Enter") e.target.blur();
                            if (e.key === "Escape") setEditingText(null);
                          }}
                          style={{width:"100%",fontSize:"14px",border:"1px solid #a855f7",borderRadius:"6px",padding:"2px 8px",outline:"none"}}
                        />
                      ) : (
                        <span
                          onClick={() => { setEditingText(item.id); setEditingTextVal(item.text); }}
                          title="Click to rename"
                          style={{
                            fontSize:"14px", cursor:"text",
                            textDecoration: item.status === "done" ? "line-through" : "none",
                            color: item.status === "done" ? "#9ca3af" : "#1f2937",
                            padding:"1px 4px", borderRadius:"4px",
                          }}
                          onMouseEnter={e => e.target.style.background="#f3e8ff"}
                          onMouseLeave={e => e.target.style.background="transparent"}
                        >
                          {item.text}
                        </span>
                      )}
                      {item.link && editingText !== item.id && (
                        <a href={item.link} target="_blank" rel="noreferrer"
                           style={{marginLeft:"8px",fontSize:"12px",color:"#3b82f6",textDecoration:"none"}}
                           onMouseEnter={e=>e.target.style.textDecoration="underline"}
                           onMouseLeave={e=>e.target.style.textDecoration="none"}
                        >↗ link</a>
                      )}
                    </div>

                    {/* Due date */}
                    <div style={{flexShrink:0}}>
                      {editingDate === item.id ? (
                        <input
                          type="date"
                          autoFocus
                          value={item.dueDate}
                          onChange={e => setDueDate(item.id, e.target.value)}
                          onBlur={() => setEditingDate(null)}
                          style={{fontSize:"12px",border:"1px solid #a855f7",borderRadius:"6px",padding:"2px 6px",outline:"none"}}
                        />
                      ) : (
                        <button
                          onClick={() => setEditingDate(item.id)}
                          style={{
                            fontSize:"12px", padding:"2px 8px", borderRadius:"6px", cursor:"pointer",
                            border: overdue ? "1px solid #fb923c" : item.dueDate ? "1px solid #d1d5db" : "1px dashed #d1d5db",
                            background: overdue ? "#ffedd5" : item.dueDate ? "#f3f4f6" : "transparent",
                            color: overdue ? "#c2410c" : item.dueDate ? "#4b5563" : "#d1d5db",
                            fontWeight: overdue ? "600" : "normal",
                          }}
                        >
                          {item.dueDate ? (overdue ? `⚠️ ${formatDate(item.dueDate)}` : `📅 ${formatDate(item.dueDate)}`) : "+ due date"}
                        </button>
                      )}
                    </div>

                    {/* Priority */}
                    <button
                      onClick={() => cyclePriority(item.id)}
                      title="Click to set priority"
                      style={{
                        flexShrink:0, fontSize:"12px", padding:"2px 8px", borderRadius:"6px",
                        cursor:"pointer", fontWeight:"500",
                        border: p ? `1px solid` : "1px dashed #d1d5db",
                        borderColor: p ? (p.border.replace("border-","") === "border-red-300" ? "#fca5a5" : p.border.includes("yellow") ? "#fcd34d" : "#d1d5db") : "#d1d5db",
                        background: p ? (p.bg.includes("red") ? "#fef2f2" : p.bg.includes("yellow") ? "#fffbeb" : "#f9fafb") : "transparent",
                        color: p ? (p.color.includes("red") ? "#dc2626" : p.color.includes("yellow") ? "#d97706" : "#9ca3af") : "#d1d5db",
                      }}
                    >
                      {p ? `${p.dot} ${p.label}` : "+ priority"}
                    </button>

                    {/* Status badge */}
                    <span className={`text-xs px-2 py-1 rounded-full font-medium ${s.badge}`} style={{flexShrink:0}}>
                      {s.label}
                    </span>

                    {/* Category badges — multi-label */}
                    <div style={{display:"flex",flexWrap:"wrap",gap:"4px",alignItems:"center",flexShrink:0}}>
                      {(item.categories || []).map(cat => {
                        const cc = allCategoryColors[cat];
                        const chipKey = `${item.id}:${cat}`;
                        const isHovered = hoveredChip === chipKey;
                        if (!cc) return null;
                        return cc.isCustom ? (
                          <span
                            key={cat}
                            onMouseEnter={() => setHoveredChip(chipKey)}
                            onMouseLeave={() => setHoveredChip(null)}
                            style={{display:"inline-flex",alignItems:"center",gap:"2px",fontSize:"12px",padding:"2px 7px",borderRadius:"9999px",fontWeight:"500",background:cc.bg,color:cc.text,border:`1px solid ${cc.border}`,cursor:"default"}}
                          >
                            {cat}
                            <button
                              onClick={() => updateItems(prev => prev.map(t => t.id === item.id ? { ...t, categories: t.categories.filter(x => x !== cat) } : t))}
                              style={{background:"none",border:"none",cursor:"pointer",padding:"0",fontSize:"13px",lineHeight:1,fontWeight:"bold",color:cc.text,opacity:isHovered?0.7:0,transition:"opacity 0.1s"}}
                            >×</button>
                          </span>
                        ) : (
                          <span
                            key={cat}
                            onMouseEnter={() => setHoveredChip(chipKey)}
                            onMouseLeave={() => setHoveredChip(null)}
                            className={`text-xs rounded-full font-medium ${cc.bg} ${cc.text}`}
                            style={{display:"inline-flex",alignItems:"center",gap:"2px",padding:"2px 7px",cursor:"default"}}
                          >
                            {cat}
                            <button
                              onClick={() => updateItems(prev => prev.map(t => t.id === item.id ? { ...t, categories: t.categories.filter(x => x !== cat) } : t))}
                              style={{background:"none",border:"none",cursor:"pointer",padding:"0",fontSize:"13px",lineHeight:1,fontWeight:"bold",opacity:isHovered?0.7:0,transition:"opacity 0.1s"}}
                            >×</button>
                          </span>
                        );
                      })}
                      {/* Add label button / dropdown */}
                      {editingCategory === item.id ? (
                        <select
                          autoFocus
                          defaultValue=""
                          onChange={e => {
                            const val = e.target.value;
                            if (val && !(item.categories || []).includes(val)) {
                              updateItems(prev => prev.map(t => t.id === item.id ? { ...t, categories: [...(t.categories||[]), val] } : t));
                            }
                            setEditingCategory(null);
                          }}
                          onBlur={() => setEditingCategory(null)}
                          style={{fontSize:"12px",border:"1px solid #a855f7",borderRadius:"7px",padding:"2px 6px",outline:"none",background:"white",cursor:"pointer"}}
                        >
                          <option value="" disabled>Add label…</option>
                          {Object.keys(allCategoryColors).filter(cat => !(item.categories||[]).includes(cat)).map(cat => (
                            <option key={cat} value={cat}>{cat}</option>
                          ))}
                        </select>
                      ) : (
                        <button
                          onClick={() => setEditingCategory(item.id)}
                          title="Add label"
                          style={{
                            fontSize:"11px",padding:"2px 6px",borderRadius:"9999px",cursor:"pointer",
                            border:"1px dashed #d1d5db",background:"transparent",color:"#9ca3af",lineHeight:"1.4",
                            opacity: hoveredId === item.id || (item.categories||[]).length === 0 ? 1 : 0,
                            transition:"opacity 0.15s",
                          }}
                        >{(item.categories||[]).length === 0 ? "+ label" : "+"}</button>
                      )}
                    </div>

                    {/* Delete button — visible on hover */}
                    <button
                      onClick={() => deleteItem(item.id)}
                      title="Delete task"
                      style={{
                        flexShrink:0, background:"none", border:"none", cursor:"pointer",
                        fontSize:"15px", padding:"2px 4px", borderRadius:"6px", lineHeight:1,
                        opacity: hoveredId === item.id ? 1 : 0,
                        transition: "opacity 0.15s",
                        color: "#ef4444",
                      }}
                    >🗑️</button>
                  </div>
                );
              })}
            </div>

            <p className="text-center text-xs text-gray-400 mt-8">
              Click ○ to cycle status · Click task text to rename · Click "+ priority" to set priority · Click "+ due date" to pick a date
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.render(<Dashboard />, document.getElementById("root"));
  </script>
</body>
</html>
